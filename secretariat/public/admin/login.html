<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ISSA Capital — Admin</title>
    <link rel="stylesheet" href="/admin/static/css/admin.css" />
  </head>
  <body class="login-body">
    <main class="login-container">
      <header class="login-header">
        <h1>ISSA Capital</h1>
        <p class="login-subtitle">Administration — Secrétariat</p>
      </header>

      <form id="login-form" class="login-form" autocomplete="off">
        <label class="field">
          <span class="field-label">Mot de passe</span>
          <input
            type="password"
            id="password"
            name="password"
            required
            autofocus
            autocomplete="current-password"
          />
        </label>

        <button type="submit" id="submit-btn" class="btn btn-primary">
          Se connecter
        </button>

        <p id="error-message" class="error-message" hidden></p>
      </form>

      <footer class="login-footer">
        <p>Accès réservé. Toutes les actions sont tracées.</p>
      </footer>
    </main>

    <script src="/admin/static/js/login.js"></script>
  </body>
</html>
