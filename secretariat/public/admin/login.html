<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ISSA Capital — Admin</title>
    <link rel="stylesheet" href="/admin/static/css/admin.css" />
  </head>
  <body class="login-body">
    <main class="login-container">
      <header class="login-header">
        <h1>ISSA Capital</h1>
        <p class="login-subtitle">Administration — Secrétariat</p>
      </header>

      <form id="login-form" class="login-form" autocomplete="off">
        <label class="field">
          <span class="field-label">Mot de passe</span>
          <input
            type="password"
            id="password"
            name="password"
            required
            autofocus
            autocomplete="current-password"
          />
        </label>

        <button type="submit" id="submit-btn" class="btn btn-primary">
          Se connecter
        </button>

        <p id="error-message" class="error-message" hidden></p>
      </form>

      <footer class="login-footer">
        <p>Accès réservé. Toutes les actions sont tracées.</p>
      </footer>
    </main>

    <script>
      (function () {
        var form = document.getElementById('login-form');
        var errorEl = document.getElementById('error-message');
        var submitBtn = document.getElementById('submit-btn');

        // Si déjà authentifié, rediriger vers le dashboard
        fetch('/admin/api/me', { credentials: 'same-origin' })
          .then(function (r) {
            if (r.ok) {
              window.location.href = '/admin/dashboard.html';
            }
          })
          .catch(function () {
            // pas grave — on reste sur login
          });

        form.addEventListener('submit', function (event) {
          event.preventDefault();
          errorEl.hidden = true;
          errorEl.textContent = '';
          submitBtn.disabled = true;
          submitBtn.textContent = 'Connexion...';

          var password = document.getElementById('password').value;

          fetch('/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ password: password }),
          })
            .then(function (res) {
              return res.json().then(function (body) {
                return { status: res.status, body: body };
              });
            })
            .then(function (result) {
              if (result.status === 200 && result.body.success) {
                window.location.href = '/admin/dashboard.html';
              } else {
                var msg =
                  (result.body && result.body.error) ||
                  'Connexion impossible, réessayer.';
                errorEl.textContent = msg;
                errorEl.hidden = false;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
              }
            })
            .catch(function () {
              errorEl.textContent = 'Erreur réseau — vérifier la connexion.';
              errorEl.hidden = false;
              submitBtn.disabled = false;
              submitBtn.textContent = 'Se connecter';
            });
        });
      })();
    </script>
  </body>
</html>
