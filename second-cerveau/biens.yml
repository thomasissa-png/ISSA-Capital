# Référentiel des biens loués (indivision Issa-Guerin / LMNP Thomas Issa)
# Utilisé par generer_quittance.py pour produire l'adresse du bien sur la quittance.
# La clé "match_adresse" est un fragment recherché dans le frontmatter `adresse_bien` de la fiche locataire.
# Le premier bien qui matche est utilisé.

bailleur:
  nom: "Thomas Issa"
  telephone: "06 64 85 06 31"
  adresse: "54 rue Henri Barbusse"
  cp_ville: "92000 Nanterre"
  # Image PNG de la signature (chemin relatif au dossier Quittances, ou absolu).
  # À déposer dans le même dossier sous le nom signature-thomas-issa.png.
  # Si le fichier n'existe pas, le PDF est généré sans signature visible.
  signature_image: "signature-thomas-issa.png"
  signature_largeur_mm: 40   # largeur d'affichage de la signature dans le PDF

biens:
  - id: "barbusse-studio"
    match_adresse: ["54 rue Henri Barbusse", "Henri Barbusse"]
    ligne1: "54 rue Henri Barbusse"
    ligne2: "Studio RDC"
    cp_ville: "92000 Nanterre"

  - id: "bd-seine-nanterre"
    match_adresse: ["2 bis boulevard de la Seine", "2bis boulevard de la Seine", "boulevard de la Seine"]
    ligne1: "2 bis boulevard de la Seine"
    # ligne2 sera complétée dynamiquement avec "Studio X, 6e étage" depuis l'adresse_bien du locataire
    ligne2_template: "{studio}, 6e étage"
    cp_ville: "92000 Nanterre"

  - id: "myrha-paris"
    match_adresse: ["74 rue Myrha", "Myrha"]
    ligne1: "74 rue Myrha"
    ligne2: "Studio RDC"
    cp_ville: "75018 Paris"

  - id: "saint-michel-rue"
    match_adresse: ["Saint-Michel", "Saint Michel", "Saint-michel"]
    # Cas spécial : deux studios à la même adresse (côté rue + côté cour)
    # On identifie via la mention "côté rue" / "côté cour" dans adresse_bien
    ligne1: "7 passage Saint-Michel"
    ligne2_par_cote:
      "côté rue": "Studio sur rue"
      "côté cour": "Studio sur cour"
      "studio côté rue": "Studio sur rue"
      "studio côté cour": "Studio sur cour"
    ligne2_defaut: "Studio rez-de-chaussée"
    cp_ville: "75017 Paris"
