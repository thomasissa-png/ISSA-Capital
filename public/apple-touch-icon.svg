<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none" role="img" aria-label="ISSA Capital">
  <title>ISSA Capital</title>
  <!--
    Source SVG pour apple-touch-icon.png (180×180)
    Les coins arrondis sont appliqués automatiquement par iOS au masquage
    Fond plein ink-950 — monogramme IC crème avec accent ocre
    Direction A validée par Thomas (post-deploy 2026-04-07)
  -->

  <!-- Fond -->
  <rect width="180" height="180" fill="#0A0A0A"/>

  <!-- ===== Lettre I — zone gauche ===== -->
  <!-- Fût vertical I -->
  <rect x="22" y="38" width="16" height="104" fill="#F5F0E8"/>
  <!-- Empattement haut I -->
  <rect x="12" y="38" width="36" height="11" fill="#F5F0E8"/>
  <!-- Empattement bas I -->
  <rect x="12" y="131" width="36" height="11" fill="#F5F0E8"/>

  <!-- ===== Lettre C — zone droite, courbe ouverte ===== -->
  <!-- Barre supérieure C -->
  <rect x="70" y="38" width="82" height="15" fill="#F5F0E8"/>
  <!-- Fût gauche C -->
  <rect x="70" y="38" width="16" height="104" fill="#F5F0E8"/>
  <!-- Barre inférieure C -->
  <rect x="70" y="127" width="82" height="15" fill="#F5F0E8"/>
  <!-- Creusement intérieur C -->
  <rect x="86" y="53" width="66" height="74" fill="#0A0A0A"/>

  <!-- Filet ocre levantin -->
  <rect x="12" y="152" width="140" height="7" fill="#C4935A"/>
</svg>
