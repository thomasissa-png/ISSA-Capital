<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="ISSA Capital — monogramme IC">
  <title>ISSA Capital — monogramme IC</title>
  <!--
    Monogramme ISSA Capital — "IC" stylisé avec accent ocre
    Usage : icônes, signatures compactes, nav mobile, splash screens
    Direction A validée par Thomas (post-deploy 2026-04-07)
    Fond carré ink-950 | Glyphes parchment-100 | Filet levant-500
  -->

  <!-- Fond carré ink-950 pour usage standalone -->
  <rect width="64" height="64" fill="#0A0A0A"/>

  <!-- ===== Lettre I — zone gauche, proportions 64px ===== -->
  <!-- Fût vertical I -->
  <rect x="9" y="14" width="6" height="36" fill="#F5F0E8"/>
  <!-- Empattement haut I -->
  <rect x="5" y="14" width="14" height="4" fill="#F5F0E8"/>
  <!-- Empattement bas I -->
  <rect x="5" y="46" width="14" height="4" fill="#F5F0E8"/>

  <!-- ===== Lettre C — zone droite, courbe ouverte ===== -->
  <!-- Barre supérieure C -->
  <rect x="28" y="14" width="26" height="5" fill="#F5F0E8"/>
  <!-- Fût gauche C -->
  <rect x="28" y="14" width="6" height="36" fill="#F5F0E8"/>
  <!-- Barre inférieure C -->
  <rect x="28" y="45" width="26" height="5" fill="#F5F0E8"/>
  <!-- Creusement intérieur C -->
  <rect x="34" y="19" width="20" height="26" fill="#0A0A0A"/>

  <!-- Filet ocre levantin — signature graphique -->
  <rect x="5" y="53" width="49" height="2.5" fill="#C4935A"/>
</svg>
