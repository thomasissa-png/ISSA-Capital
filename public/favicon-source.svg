<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="ISSA Capital favicon source">
  <title>ISSA Capital favicon source</title>
  <!--
    Source SVG haute définition pour export PNG favicon.ico multi-tailles (16/32/48)
    Monogramme "IC" — Direction A validée par Thomas (post-deploy 2026-04-07)
    viewBox 512×512 — marges généreuses pour rendu propre aux petites tailles
    Fond : ink-950 #0A0A0A | Glyphes : parchment-100 #F5F0E8 | Accent : levant-500 #C4935A
  -->

  <!-- Fond -->
  <rect width="512" height="512" fill="#0A0A0A"/>

  <!-- ===== Lettre I — zone gauche, proportions équilibrées ===== -->
  <!-- Fût vertical I -->
  <rect x="88" y="112" width="44" height="288" fill="#F5F0E8"/>
  <!-- Empattement haut I -->
  <rect x="60" y="112" width="100" height="32" fill="#F5F0E8"/>
  <!-- Empattement bas I -->
  <rect x="60" y="368" width="100" height="32" fill="#F5F0E8"/>

  <!-- ===== Lettre C — zone droite, courbe ouverte ===== -->
  <!-- Barre supérieure C -->
  <rect x="220" y="112" width="156" height="40" fill="#F5F0E8"/>
  <!-- Fût gauche C (vertical) -->
  <rect x="220" y="112" width="44" height="288" fill="#F5F0E8"/>
  <!-- Barre inférieure C -->
  <rect x="220" y="360" width="156" height="40" fill="#F5F0E8"/>
  <!-- Encoche supérieure droite — créer l'ouverture du C -->
  <rect x="316" y="112" width="60" height="40" fill="#0A0A0A"/>
  <!-- Encoche inférieure droite -->
  <rect x="316" y="360" width="60" height="40" fill="#0A0A0A"/>
  <!-- Creusement intérieur C (partie centrale) -->
  <rect x="264" y="152" width="112" height="208" fill="#0A0A0A"/>

  <!-- Filet ocre levantin — signature graphique -->
  <rect x="60" y="440" width="316" height="16" fill="#C4935A"/>
</svg>
