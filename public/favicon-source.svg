<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="ISSA Capital favicon source">
  <title>ISSA Capital favicon source</title>
  <!--
    Source SVG pour génération favicon.ico multi-tailles (16/32/48)
    Ce fichier est converti en PNG aux tailles nécessaires puis assemblé en .ico
    Voir docs/design/assets-handoff.md pour les commandes de conversion
  -->

  <!-- Fond -->
  <rect width="48" height="48" fill="#0A0A0A"/>

  <!-- Fût vertical du I — légèrement plus épais à 48px pour la lisibilité -->
  <rect x="21" y="10" width="6" height="28" fill="#F5F0E8"/>
  <!-- Empattement haut -->
  <rect x="14" y="10" width="20" height="4" fill="#F5F0E8"/>
  <!-- Empattement bas -->
  <rect x="14" y="34" width="20" height="4" fill="#F5F0E8"/>

  <!-- Accent ocre -->
  <rect x="17" y="40.5" width="14" height="2" fill="#C4935A"/>
</svg>
