<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="ISSA Capital">
  <title>ISSA Capital</title>
  <!--
    Favicon ISSA Capital — Source master 512×512 pour génération PNG/ICO
    Variante A sans-serif géométrique (session 8)
    Décision Thomas : Variante A retenue après comparaison visuelle des 3 variantes.

    Même géométrie que favicon.svg (64×64) multipliée par 8 :
      Couleurs identiques, proportions identiques.
      Cette source est utilisée par le script generate-assets.mjs
      pour produire les PNG 16/32/48/180/192/512px et favicon.ico.

    Tokens primitifs (docs/design/design-tokens.json) :
      ink-950       #0A0A0A
      parchment-100 #F5F0E8
      levant-500    #C4935A

    Géométrie (viewBox 512×512) — conversion × 8 depuis la Variante A 64×64 :
      Centre       : (256, 256)
      Fond         : R=252 (plein, ink-950)
      Contour ext  : R=240, stroke 20px levant-500
      Cercle déco  : R=208, stroke 6.4px levant-500 opacity=0.5

    Lettres IC — bloc centré 164→348, centre 256
      I sans-serif : barre verticale x=164→192 (28px large), y=144→368 (224px haut)
      C géométrique : centre optique (348, 256), Re=88, Ri=56

    I géométrique : barre verticale pure, path L uniquement
      x=164 → 192, y=144 → 368

    C géométrique (Bézier cubique k=0.5523, Re×k=48.6, Ri×k=30.9) :
      Arc extérieur : (348,168) → (260,256) → (348,344)
      Arc intérieur : (348,200) → (292,256) → (348,312)
  -->

  <!-- Fond circulaire plein — ink-950 -->
  <circle cx="256" cy="256" r="252" fill="#0A0A0A"/>

  <!-- Contour extérieur du sceau — levant-500 -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#C4935A" stroke-width="20"/>

  <!-- Cercle intérieur décoratif — levant-500 atténué -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="#C4935A" stroke-width="6.4" opacity="0.5"/>

  <!--
    I géométrique — barre verticale pure, sans empattement
    Largeur 28px, bord gauche x=164, bord droit x=192
    y=144 → y=368 (hauteur caps 224px)
  -->
  <path
    d="M 164,144 L 192,144 L 192,368 L 164,368 Z"
    fill="#F5F0E8"
  />

  <!--
    C géométrique — arc de cercle pur, ouverture droite, extrémités plates
    Centre optique (348, 256)
    Arc extérieur Re=88, arc intérieur Ri=56
    Bézier cubique k=0.5523
  -->
  <path
    d="M 348,168
       C 299.4,168 260,207.4 260,256
       C 260,304.6 299.4,344 348,344
       L 348,312
       C 317.1,312 292,286.9 292,256
       C 292,225.1 317.1,200 348,200
       Z"
    fill="#F5F0E8"
  />

</svg>
