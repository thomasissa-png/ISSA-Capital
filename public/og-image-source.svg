<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none" role="img" aria-label="ISSA Capital — Racines libanaises. Exigences sans exception.">
  <title>ISSA Capital</title>
  <!--
    OG Image source ISSA Capital — 1200×630
    Monogramme "IC" grand format + baseline + URL
    Direction A validée par Thomas (post-deploy 2026-04-07)
    Fond : ink-950 #0A0A0A | Glyphes : parchment-100 #F5F0E8 | Accent : levant-500 #C4935A
    Style : minimaliste éditorial, zéro gradient, zéro shadow
    Textes via <text> avec fallback Georgia serif — rendu SVG-vers-PNG via sharp/Puppeteer
  -->

  <!-- Fond plein ink-950 -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- ===== MONOGRAMME IC — grand format, zone gauche ===== -->
  <g id="monogram-ic" transform="translate(80, 160)">

    <!-- Lettre I -->
    <!-- Fût vertical I -->
    <rect x="0" y="0" width="20" height="140" fill="#F5F0E8"/>
    <!-- Empattement haut I -->
    <rect x="-14" y="0" width="48" height="13" fill="#F5F0E8"/>
    <!-- Empattement bas I -->
    <rect x="-14" y="127" width="48" height="13" fill="#F5F0E8"/>

    <!-- Lettre C -->
    <!-- Barre supérieure C -->
    <rect x="38" y="0" width="90" height="18" fill="#F5F0E8"/>
    <!-- Fût gauche C -->
    <rect x="38" y="0" width="20" height="140" fill="#F5F0E8"/>
    <!-- Barre inférieure C -->
    <rect x="38" y="122" width="90" height="18" fill="#F5F0E8"/>
    <!-- Creusement intérieur C -->
    <rect x="58" y="18" width="70" height="104" fill="#0A0A0A"/>
  </g>

  <!-- Séparateur vertical ocre — entre monogramme et baseline/texte -->
  <rect x="268" y="140" width="1.5" height="200" fill="#C4935A"/>

  <!-- ===== WORDMARK ISSA CAPITAL — texte vectoriel via <text> fallback serif ===== -->
  <text
    x="292"
    y="228"
    font-family="'EB Garamond', 'Cormorant Garamond', 'Garamond', 'Georgia', serif"
    font-size="72"
    font-weight="600"
    letter-spacing="16"
    fill="#F5F0E8"
  >ISSA</text>

  <text
    x="294"
    y="272"
    font-family="'EB Garamond', 'Cormorant Garamond', 'Garamond', 'Georgia', serif"
    font-size="24"
    font-weight="400"
    letter-spacing="10"
    fill="#C4935A"
  >CAPITAL</text>

  <!-- ===== FILET SÉPARATEUR CENTRAL ===== -->
  <rect x="80" y="340" width="1040" height="1" fill="#2D2D2D"/>

  <!-- ===== BASELINE — EB Garamond italic crème, centrée ===== -->
  <text
    x="600"
    y="430"
    text-anchor="middle"
    font-family="'EB Garamond', 'Cormorant Garamond', 'Garamond', 'Georgia', serif"
    font-size="38"
    font-weight="400"
    font-style="italic"
    letter-spacing="1"
    fill="#F5F0E8"
  >Racines libanaises. Exigences sans exception.</text>

  <!-- ===== FILET OCRE BAS — accent décoratif discret ===== -->
  <rect x="540" y="510" width="120" height="1.5" fill="#C4935A"/>

  <!-- ===== URL DISCRÈTE — bas droite ===== -->
  <text
    x="1120"
    y="580"
    text-anchor="end"
    font-family="'EB Garamond', 'Cormorant Garamond', 'Garamond', 'Georgia', serif"
    font-size="16"
    font-weight="400"
    letter-spacing="2"
    fill="#525252"
  >issa-capital.com</text>
</svg>
