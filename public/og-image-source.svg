<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none" role="img" aria-label="ISSA Capital — Racines libanaises. Exigences sans exception.">
  <title>ISSA Capital</title>
  <!--
    OG Image source ISSA Capital — 1200×630
    Fond : ink-950 #0A0A0A
    Logo : crème parchment-100 #F5F0E8
    Baseline : Cormorant Garamond italic crème
    Accent : filet ocre levantin levant-500 #C4935A
    Voir docs/design/assets-handoff.md pour conversion en PNG 1200×630
    Style : minimaliste éditorial, zéro gradient, zéro shadow, sobriété premium
  -->

  <!-- Fond plein ink-950 -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Marges intérieures : 80px horizontal, 72px vertical -->

  <!-- ===== LOGO ISSA CAPITAL — centré verticalement dans le tiers supérieur ===== -->
  <g id="logo" transform="translate(80, 160)">

    <!-- Monogramme I — version épurée haute résolution -->
    <!-- Empattement haut -->
    <rect x="0" y="0" width="64" height="5" fill="#F5F0E8"/>
    <!-- Fût vertical -->
    <rect x="27" y="0" width="10" height="100" fill="#F5F0E8"/>
    <!-- Empattement bas -->
    <rect x="0" y="95" width="64" height="5" fill="#F5F0E8"/>

    <!-- Séparateur vertical ocre — filet de prestige -->
    <rect x="80" y="0" width="1.5" height="100" fill="#C4935A"/>

    <!-- Wordmark ISSA -->
    <text
      x="98"
      y="56"
      font-family="'Cormorant Garamond', 'Cormorant', 'Garamond', 'Georgia', serif"
      font-size="72"
      font-weight="600"
      letter-spacing="16"
      fill="#F5F0E8"
    >ISSA</text>

    <!-- Wordmark CAPITAL — corps réduit, ocre -->
    <text
      x="100"
      y="88"
      font-family="'Cormorant Garamond', 'Cormorant', 'Garamond', 'Georgia', serif"
      font-size="22"
      font-weight="400"
      letter-spacing="10"
      fill="#C4935A"
    >CAPITAL</text>
  </g>

  <!-- ===== FILET SÉPARATEUR CENTRAL ===== -->
  <rect x="80" y="320" width="1040" height="1" fill="#2D2D2D"/>

  <!-- ===== BASELINE — Cormorant Garamond italic crème, centrée ===== -->
  <text
    x="600"
    y="430"
    text-anchor="middle"
    font-family="'Cormorant Garamond', 'Cormorant', 'Garamond', 'Georgia', serif"
    font-size="38"
    font-weight="400"
    font-style="italic"
    letter-spacing="1"
    fill="#F5F0E8"
  >Racines libanaises. Exigences sans exception.</text>

  <!-- ===== FILET OCRE BAS — accent décoratif discret ===== -->
  <!-- Filet centré, largeur mesurée -->
  <rect x="540" y="510" width="120" height="1.5" fill="#C4935A"/>

  <!-- ===== URL DISCRÈTE — en bas à droite, caption ===== -->
  <text
    x="1120"
    y="580"
    text-anchor="end"
    font-family="'Cormorant Garamond', 'Cormorant', 'Garamond', 'Georgia', serif"
    font-size="16"
    font-weight="400"
    letter-spacing="2"
    fill="#525252"
  >issa-capital.com</text>
</svg>
