<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none" role="img" aria-label="ISSA Capital">
  <title>ISSA Capital</title>
  <!--
    Logo ISSA Capital — version principale (fond clair, encre sur crème)
    Palette : ink-950 #0A0A0A sur fond transparent (pour usage sur parchment-100 #F5F0E8)
    Typographie : tracé vectoriel inspiré Cormorant Garamond — letterforms serif élégantes
    Déclinaisons : logo.svg (fond clair), logo-inverse.svg (fond sombre)
  -->

  <!-- Séparateur vertical ocre levantin — filet de prestige -->
  <rect x="72" y="14" width="1" height="36" fill="#C4935A"/>

  <!-- Wordmark "ISSA" — serif condensé, majuscules espacées -->
  <!-- Lettre I -->
  <rect x="8" y="16" width="2.5" height="32" fill="#0A0A0A"/>
  <!-- Empattements I haut/bas -->
  <rect x="4" y="16" width="10.5" height="2" fill="#0A0A0A"/>
  <rect x="4" y="46" width="10.5" height="2" fill="#0A0A0A"/>

  <!-- Lettre S (première) -->
  <path d="M22 18 Q22 16 24 16 L34 16 Q36 16 36 18 L36 19.5 Q36 21 34 21 L24 21 Q22 21 22 23 L22 31 Q22 33 24 33 L34 33 Q36 33 36 35 L36 45.5 Q36 48 34 48 L22 48 Q20 48 20 46 L20 44.5" stroke="#0A0A0A" stroke-width="2.5" fill="none" stroke-linecap="square"/>
  <path d="M20 30 L36 30" stroke="#0A0A0A" stroke-width="1" stroke-dasharray="0" fill="none"/>

  <!-- Lettre S (seconde) -->
  <path d="M44 18 Q44 16 46 16 L56 16 Q58 16 58 18 L58 19.5 Q58 21 56 21 L46 21 Q44 21 44 23 L44 31 Q44 33 46 33 L56 33 Q58 33 58 35 L58 45.5 Q58 48 56 48 L44 48 Q42 48 42 46 L42 44.5" stroke="#0A0A0A" stroke-width="2.5" fill="none" stroke-linecap="square"/>

  <!-- Lettre A -->
  <path d="M60 48 L68 16 L76 48" stroke="#0A0A0A" stroke-width="2.5" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
  <line x1="62.5" y1="37" x2="73.5" y2="37" stroke="#0A0A0A" stroke-width="2"/>

  <!-- CAPITAL — corps de texte, espacé, prestige -->
  <!-- C -->
  <path d="M86 30 Q86 16 96 16 L104 16 L104 19 L96 19 Q89 19 89 30 L89 34 Q89 45 96 45 L104 45 L104 48 L96 48 Q86 48 86 34 Z" fill="#0A0A0A"/>

  <!-- A -->
  <path d="M108 48 L115 16 L122 48" stroke="#0A0A0A" stroke-width="2" fill="none" stroke-linecap="square"/>
  <line x1="110" y1="37" x2="120" y2="37" stroke="#0A0A0A" stroke-width="1.5"/>

  <!-- P -->
  <rect x="126" y="16" width="2.5" height="32" fill="#0A0A0A"/>
  <path d="M128.5 16 L136 16 Q143 16 143 25 Q143 34 136 34 L128.5 34" stroke="#0A0A0A" stroke-width="2.5" fill="none" stroke-linecap="square"/>

  <!-- I -->
  <rect x="148" y="16" width="2.5" height="32" fill="#0A0A0A"/>
  <rect x="144.5" y="16" width="9.5" height="2" fill="#0A0A0A"/>
  <rect x="144.5" y="46" width="9.5" height="2" fill="#0A0A0A"/>

  <!-- T -->
  <rect x="158" y="16" width="14" height="2" fill="#0A0A0A"/>
  <rect x="164.5" y="18" width="2.5" height="30" fill="#0A0A0A"/>

  <!-- A -->
  <path d="M182 48 L189 16 L196 48" stroke="#0A0A0A" stroke-width="2" fill="none" stroke-linecap="square"/>
  <line x1="184" y1="37" x2="194" y2="37" stroke="#0A0A0A" stroke-width="1.5"/>

  <!-- L -->
  <rect x="200" y="16" width="2.5" height="32" fill="#0A0A0A"/>
  <rect x="200" y="46" width="12" height="2" fill="#0A0A0A"/>

  <!-- Filet accent ocre sous "CAPITAL" — discret, luxueux -->
  <rect x="86" y="52" width="126" height="1" fill="#C4935A"/>
</svg>
