<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="ISSA Capital">
  <title>ISSA Capital</title>
  <!--
    Source SVG pour android-chrome-512x512.png
    Fond plein ink-950 — monogramme IC crème avec accent ocre
    Direction A validée par Thomas (post-deploy 2026-04-07)
  -->

  <!-- Fond -->
  <rect width="512" height="512" fill="#0A0A0A"/>

  <!-- ===== Lettre I — zone gauche ===== -->
  <!-- Fût vertical I -->
  <rect x="60" y="106" width="44" height="300" fill="#F5F0E8"/>
  <!-- Empattement haut I -->
  <rect x="32" y="106" width="100" height="30" fill="#F5F0E8"/>
  <!-- Empattement bas I -->
  <rect x="32" y="376" width="100" height="30" fill="#F5F0E8"/>

  <!-- ===== Lettre C — zone droite, courbe ouverte ===== -->
  <!-- Barre supérieure C -->
  <rect x="196" y="106" width="224" height="40" fill="#F5F0E8"/>
  <!-- Fût gauche C -->
  <rect x="196" y="106" width="44" height="300" fill="#F5F0E8"/>
  <!-- Barre inférieure C -->
  <rect x="196" y="366" width="224" height="40" fill="#F5F0E8"/>
  <!-- Creusement intérieur C -->
  <rect x="240" y="146" width="180" height="220" fill="#0A0A0A"/>

  <!-- Filet ocre levantin -->
  <rect x="32" y="432" width="388" height="18" fill="#C4935A"/>
</svg>
