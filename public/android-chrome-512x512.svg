<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="ISSA Capital">
  <title>ISSA Capital</title>
  <!--
    Source SVG pour android-chrome-512x512.png
    Taille splash screen / manifest icon grande taille
    Voir docs/design/assets-handoff.md pour conversion en PNG 512×512
  -->

  <!-- Fond -->
  <rect width="512" height="512" fill="#0A0A0A"/>

  <!-- Fût vertical du I — centré, proportions luxueuses -->
  <rect x="228" y="96" width="56" height="320" fill="#F5F0E8"/>
  <!-- Empattement haut -->
  <rect x="152" y="96" width="208" height="32" fill="#F5F0E8"/>
  <!-- Empattement bas -->
  <rect x="152" y="384" width="208" height="32" fill="#F5F0E8"/>

  <!-- Accent ocre — filet raffiné -->
  <rect x="176" y="424" width="160" height="12" fill="#C4935A"/>
</svg>
