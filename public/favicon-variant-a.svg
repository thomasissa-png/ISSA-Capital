<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="ISSA Capital">
  <title>ISSA Capital — Variante A Sans-serif géométrique</title>
  <!--
    Variante A — Sans-serif géométrique (référence : Futura Bold / Avenir Black)
    Session 8 — Refonte typographique post-rejet Direction 1 session 7

    Concept : lettres IC géométriques pures — aucun empattement, aucun ornement.
    Le I est une barre verticale simple à extrémités plates.
    Le C est un arc de cercle ouvert sur la droite construit en Bézier cubique k=0.5523.
    Signal : modernité, précision, intemporalité.

    Géométrie (viewBox 64×64) :
      Centre  : (32, 32)
      Sceau   : fond R=31.5 ink-950, contour R=30 stroke 2.5 levant-500
      Cercle intérieur décoratif : R=26 stroke 0.8 levant-500 opacity=0.5

    Lettres IC — zone centrale 22×28px, centrée optiquement
      Bloc total : x=13→51, y=18→46 — hauteur caps 28px
      I sans-serif : barre verticale x=14.5→17.5 (3px large), y=18→46
      Espacement tracking : 3px entre I et C
      C géométrique : centre optique x=37, Re=11, Ri=7

    I géométrique :
      Simple barre verticale, largeur 3.5px, hauteur complète caps 28px
      Path L uniquement (ligne droite)
      x= 14 → 17.5, y= 18 → 46

    C géométrique (Bézier cubique, k=0.5523) :
      Centre (37, 32), Re=11, Ri=7
      Ouverture : ~80° (coupe à 10h30 / 16h30 = y ± 9.5px)
      Arc extérieur :
        Haut cut : (37, 21)   → arc → (26, 32) → arc → (37, 43)
        C (31.93, 21) (26, 26.93) (26, 32)
        C (26, 37.07) (31.93, 43) (37, 43)
      Terminaisons : extrémités plates horizontales (coupe à 10h/16h)

    Lisibilité 16px : NETTE — le I est une barre pure, le C est un arc lisse sans détail parasite
    Risque : peut sembler froid — compensé par la chaleur des tokens ocre/parchment
  -->

  <!-- Fond circulaire — ink-950 #0A0A0A -->
  <circle cx="32" cy="32" r="31.5" fill="#0A0A0A"/>

  <!-- Contour extérieur sceau — levant-500 #C4935A -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#C4935A" stroke-width="2.5"/>

  <!-- Cercle intérieur décoratif — levant-500 atténué -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#C4935A" stroke-width="0.8" opacity="0.5"/>

  <!--
    I géométrique — barre verticale pure, sans empattement
    Largeur 3.5px, centrée sur x=15.75
    y=18 → y=46 (hauteur caps 28px)
  -->
  <path
    d="M 14,18 L 17.5,18 L 17.5,46 L 14,46 Z"
    fill="#F5F0E8"
  />

  <!--
    C géométrique — arc de cercle pur, ouverture droite, extrémités plates
    Centre optique (37, 32)
    Arc extérieur  : Re=11 → points (37,21) arc gauche (37,43)
    Arc intérieur  : Ri=7  → points (37,25) arc gauche (37,39)
    Bézier cubique k=0.5523 :
      Re=11 → cp offset = 6.075
      Ri=7  → cp offset = 3.866

    Arc ext haut  : M(37,21) C(30.925,21)(26,26.925)(26,32)
    Arc ext bas   : (26,32) C(26,37.075)(30.925,43)(37,43)
    Arc int bas   : (37,39) C(33.134,39)(30,35.866)(30,32)
    Arc int haut  : (30,32) C(30,28.134)(33.134,25)(37,25)

    Extrémités plates (stroke-linecap = butt implicite dans path)
  -->
  <path
    d="M 37,21
       C 30.925,21 26,26.925 26,32
       C 26,37.075 30.925,43 37,43
       L 37,39
       C 33.134,39 30,35.866 30,32
       C 30,28.134 33.134,25 37,25
       Z"
    fill="#F5F0E8"
  />

</svg>
