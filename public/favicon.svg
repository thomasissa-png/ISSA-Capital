<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="ISSA Capital">
  <title>ISSA Capital</title>
  <!--
    Favicon vectoriel ISSA Capital — 32×32 viewBox
    Fond : ink-950 #0A0A0A
    Monogramme : "I" crème #F5F0E8 avec accent ocre levant-500 #C4935A
    Rendu net aux petites tailles — formes simples, pas de sous-pixel
  -->

  <!-- Fond -->
  <rect width="32" height="32" fill="#0A0A0A"/>

  <!-- Fût vertical du I -->
  <rect x="14" y="7" width="4" height="18" fill="#F5F0E8"/>
  <!-- Empattement haut -->
  <rect x="9" y="7" width="14" height="2.5" fill="#F5F0E8"/>
  <!-- Empattement bas -->
  <rect x="9" y="22.5" width="14" height="2.5" fill="#F5F0E8"/>

  <!-- Accent ocre — filet sous l'empattement bas -->
  <rect x="11" y="27" width="10" height="1.5" fill="#C4935A"/>
</svg>
