<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="ISSA Capital">
  <title>ISSA Capital</title>
  <!--
    Android Chrome 192×192 — source SVG pour génération PNG
    Direction 1 "Sceau / Cachet patrimonial" — Session 7
    Rasterisé en 192×192 via generate-assets.mjs / sharp

    Tokens primitifs (docs/design/design-tokens.json) :
      ink-950       #0A0A0A
      parchment-100 #F5F0E8
      levant-500    #C4935A

    Géométrie identique à favicon-source.svg (512×512) :
      Sceau circulaire, monogramme IC sérif Bézier.
  -->

  <!-- Fond circulaire plein — ink-950 -->
  <circle cx="256" cy="256" r="252" fill="#0A0A0A"/>

  <!-- Contour extérieur du sceau — levant-500 -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#C4935A" stroke-width="20"/>

  <!-- Cercle intérieur décoratif — levant-500 atténué -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="#C4935A" stroke-width="6" opacity="0.5"/>

  <!-- Lettre I — sérif classique (paths L) -->
  <path
    d="M 128,144
       L 208,144
       L 208,168
       L 184,168
       L 184,344
       L 208,344
       L 208,368
       L 128,368
       L 128,344
       L 152,344
       L 152,168
       L 128,168
       Z"
    fill="#F5F0E8"
  />

  <!-- Lettre C — arc Bézier cubique sérif -->
  <path
    d="M 384,144
       L 304,144
       L 304,168
       C 264,168 232,208 232,256
       C 232,304 264,344 304,344
       L 304,368
       L 384,368
       L 384,344
       L 304,344
       L 304,300
       C 280,300 260,280 260,256
       C 260,232 280,212 304,212
       L 304,168
       L 384,168
       Z"
    fill="#F5F0E8"
  />

</svg>
