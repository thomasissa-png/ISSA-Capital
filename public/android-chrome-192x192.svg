<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none" role="img" aria-label="ISSA Capital">
  <title>ISSA Capital</title>
  <!--
    Source SVG pour android-chrome-192x192.png
    Fond plein ink-950 — monogramme IC crème avec accent ocre
    Direction A validée par Thomas (post-deploy 2026-04-07)
  -->

  <!-- Fond -->
  <rect width="192" height="192" fill="#0A0A0A"/>

  <!-- ===== Lettre I — zone gauche ===== -->
  <!-- Fût vertical I -->
  <rect x="24" y="40" width="17" height="112" fill="#F5F0E8"/>
  <!-- Empattement haut I -->
  <rect x="13" y="40" width="39" height="12" fill="#F5F0E8"/>
  <!-- Empattement bas I -->
  <rect x="13" y="140" width="39" height="12" fill="#F5F0E8"/>

  <!-- ===== Lettre C — zone droite, courbe ouverte ===== -->
  <!-- Barre supérieure C -->
  <rect x="74" y="40" width="88" height="16" fill="#F5F0E8"/>
  <!-- Fût gauche C -->
  <rect x="74" y="40" width="17" height="112" fill="#F5F0E8"/>
  <!-- Barre inférieure C -->
  <rect x="74" y="136" width="88" height="16" fill="#F5F0E8"/>
  <!-- Creusement intérieur C -->
  <rect x="91" y="56" width="71" height="80" fill="#0A0A0A"/>

  <!-- Filet ocre levantin -->
  <rect x="13" y="163" width="149" height="7" fill="#C4935A"/>
</svg>
