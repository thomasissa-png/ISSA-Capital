# Drop-in override systemd pour `anya.service` — ISSA Capital S26
#
# CHEMIN VPS : /etc/systemd/system/anya.service.d/anya-shutdown.conf
# (cf. `deploy/systemd/README.md` pour la procédure d'install en SSH.)
#
# Diagnostic : journal anya 28/05 (S26) montre 2 incidents identiques —
#   - 18:05:26 → 18:06:57 (91 sec)
#   - 19:00:28 → 19:01:58 (90 sec)
# Dans les deux cas, `systemctl stop` envoie SIGTERM, Next.js l'ignore,
# systemd attend le `TimeoutStopSec` par défaut (90 sec) avant SIGKILL.
# Pendant ces 90 sec, l'unit est en `deactivating` → service indisponible.
#
# Fix :
#   - `TimeoutStopSec=30s` : raccourcit le délai SIGTERM → SIGKILL à 30 sec
#     (au lieu de 90 sec). Gain ~60 sec à chaque restart post-deploy.
#   - `KillMode=mixed` : envoie aussi SIGKILL aux processus auxiliaires
#     (corrige le warning « Failed to send signal SIGKILL to auxiliary
#     processes on client request: Invalid argument » observé en journal).
#
# Drop-in (PAS d'édition du fichier principal) : si on veut annuler, il
# suffit de supprimer ce fichier + `systemctl daemon-reload`. Le fichier
# `/etc/systemd/system/anya.service` reste intact.

[Service]
TimeoutStopSec=30s
KillMode=mixed
