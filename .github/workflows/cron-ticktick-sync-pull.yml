name: Cron TickTick Sync Pull (TickTick → vault, every 5 min)

on:
  schedule:
    # Toutes les 5 minutes (décalé de 2.5min vs cron-push pour éviter concurrence
    # parfaite — le verrou state.syncLock évite quand même les collisions).
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wait offset to avoid push collision
        # 30s offset pour réduire l'overlap avec cron-push (qui tourne au tick 0)
        run: sleep 30
      - name: Trigger TickTick sync pull
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_BASE_URL }}/api/secretariat/ticktick-sync/cron-pull"
