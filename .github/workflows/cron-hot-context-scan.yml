# DISABLED S22 — le scan hot-context envoyait des cartes de validation Telegram
# qui faisaient DOUBLON avec le traitement de l'inbox (le hot-context y est déjà
# géré). Plus aucun déclenchement automatique.
#
# Endpoint correspondant : retourne { ok: true, disabled: true } si la variable
# d'env HOT_CONTEXT_SCAN_DISABLED=1 est positionnée (garde-fou déclenchement
# manuel). Le seul appelant des cartes (sendHotContextPatchCard) est ce cron.
#
# Réactivation : décommenter le bloc schedule ci-dessous + retirer
# HOT_CONTEXT_SCAN_DISABLED côté VPS. Code applicatif conservé pour rollback.

name: Cron Hot Context Scan (DISABLED S22)

on:
  # schedule: DISABLED S22 — voir en-tête
  #   - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Noop disabled S22
        run: |
          echo "Workflow désactivé S22 — doublon avec le traitement inbox."
          echo "Réactiver : décommenter le bloc schedule + retirer HOT_CONTEXT_SCAN_DISABLED=1."
