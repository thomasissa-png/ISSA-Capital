name: Cron Email Ingest (hourly)

on:
  schedule:
    # Toutes les heures, minute 0
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger email ingest
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_BASE_URL }}/api/secretariat/cron-email-ingest"
